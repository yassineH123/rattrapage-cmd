<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — FreelanceHub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav id="navbar"></nav>
<main class="page">
  <div class="container">
    <h1 class="section-title" style="margin-bottom:20px">Messages</h1>
    <div class="messages-layout">

      <!-- Conversations list -->
      <div class="conv-list" id="convList">
        <div style="padding:10px 14px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)">Conversations</div>
        <div id="convItems" style="display:flex;flex-direction:column;gap:0"></div>
      </div>

      <!-- Chat area -->
      <div class="chat-area" id="chatArea">
        <div class="chat-empty">
          <div>
            <div style="font-size:48px;margin-bottom:10px">💬</div>
            <p style="font-weight:500">Sélectionnez une conversation</p>
            <p style="font-size:13px;margin-top:4px">ou commencez-en une nouvelle</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<footer id="footer"></footer>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
  if (!Auth.requireAuth()) throw '';
  renderNavbar('messages');
  renderFooter();

  const me = Auth.getUser();
  let activeConv = null;
  let onlineIds  = [];
  const socket   = io('http://localhost:5000');

  socket.emit('user_connected', me.id);
  socket.on('online_users', ids => { onlineIds = ids.map(String); });
  socket.on('receive_message', msg => {
    if (activeConv && String(msg.sender_id) === String(activeConv.other_id)) {
      appendMessage(msg, false);
    }
  });

  // Load conversations
  (async () => {
    const convs = await api.get('/messages');
    const el = document.getElementById('convItems');
    if (!convs.length) {
      el.innerHTML = `<div style="padding:16px;font-size:13px;color:var(--muted);text-align:center">Aucune conversation</div>`;
      return;
    }
    el.innerHTML = convs.map(c => `
      <div class="conv-item" id="conv-${c.other_id}" onclick="openConv(${JSON.stringify(c).replace(/"/g,'&quot;')})">
        <div style="position:relative;flex-shrink:0">
          ${avatarHTML(c.nom, 36)}
          <div style="position:absolute;bottom:0;right:0;width:10px;height:10px;background:#22c55e;border-radius:50%;border:2px solid #fff;display:${onlineIds.includes(String(c.other_id))?'block':'none'}"></div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.nom}</div>
          <div style="font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.dernier_message||''}</div>
        </div>
        ${c.non_lus > 0 ? `<div style="width:18px;height:18px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${c.non_lus}</div>` : ''}
      </div>`).join('');
  })();

  async function openConv(conv) {
    activeConv = conv;
    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`conv-${conv.other_id}`)?.classList.add('active');

    document.getElementById('chatArea').innerHTML = `
      <div class="chat-header">
        ${avatarHTML(conv.nom, 32)}
        <div>
          <div style="font-weight:600;font-size:14px">${conv.nom}</div>
          <div style="font-size:11px;color:var(--muted)">${onlineIds.includes(String(conv.other_id)) ? '🟢 En ligne' : 'Hors ligne'}</div>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input class="input" id="msgInput" placeholder="Écrire un message..." onkeydown="if(event.key==='Enter')sendMsg()" />
        <button class="btn btn-primary" onclick="sendMsg()">➤</button>
      </div>`;

    const msgs = await api.get(`/messages/${conv.other_id}`);
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    msgs.forEach(m => appendMessage(m, String(m.sender_id) === String(me.id)));
    scrollBottom();
  }

  function appendMessage(msg, mine) {
    const container = document.getElementById('chatMessages');
    if (!container) return;
    const div = document.createElement('div');
    div.className = `msg ${mine ? 'mine' : 'theirs'}`;
    div.innerHTML = `
      <div class="msg-bubble">
        ${msg.contenu}
        <div class="msg-time">${formatTime(msg.created_at || new Date())}</div>
      </div>`;
    container.appendChild(div);
    scrollBottom();
  }

  function scrollBottom() {
    const c = document.getElementById('chatMessages');
    if (c) c.scrollTop = c.scrollHeight;
  }

  async function sendMsg() {
    const input = document.getElementById('msgInput');
    const text  = input?.value.trim();
    if (!text || !activeConv) return;

    const msg = { sender_id: me.id, receiver_id: activeConv.other_id, contenu: text, created_at: new Date() };
    appendMessage(msg, true);
    input.value = '';

    socket.emit('send_message', msg);
    try { await api.post('/messages', { receiver_id: activeConv.other_id, contenu: text }); } catch {}
  }
</script>
</body>
</html>
