<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer un service — FreelanceHub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav id="navbar"></nav>
<main class="page">
  <div class="container" style="max-width:640px">
    <h1 class="section-title" style="margin-bottom:6px">Créer un service</h1>
    <p class="section-sub" style="margin-bottom:32px">Décrivez votre offre et attirez des clients.</p>

    <div id="alertBox"></div>

    <!-- Image upload -->
    <div class="form-group">
      <label class="form-label">Photo du service</label>
      <div id="imgDropzone" onclick="document.getElementById('imgInput').click()"
        style="border:2px dashed var(--border);border-radius:var(--radius-lg);height:180px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .2s;position:relative">
        <div id="imgPlaceholder" style="text-align:center;color:var(--muted)">
          <div style="font-size:36px;margin-bottom:8px">📷</div>
          <p style="font-size:14px">Cliquer pour ajouter une photo</p>
          <p style="font-size:12px;margin-top:4px">JPG, PNG — Max 5 MB</p>
        </div>
        <img id="imgPreview" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0" />
      </div>
      <input id="imgInput" type="file" accept="image/*" style="display:none" onchange="previewImg(this)" />
    </div>

    <div class="form-group">
      <label class="form-label">Titre du service *</label>
      <input class="input" id="titre" type="text" placeholder="ex: Je crée votre logo professionnel en 48h" />
    </div>

    <div class="form-group">
      <label class="form-label">Catégorie</label>
      <select class="input" id="categorie">
        <option value="">-- Choisir une catégorie --</option>
        <option>Design</option>
        <option>Développement</option>
        <option>Marketing</option>
        <option>Rédaction</option>
        <option>Vidéo</option>
        <option>Traduction</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Description *</label>
      <textarea class="input" id="description" rows="5" placeholder="Décrivez votre service en détail..."></textarea>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="form-group">
        <label class="form-label">Prix (DH) *</label>
        <input class="input" id="prix" type="number" min="10" placeholder="ex: 500" />
      </div>
      <div class="form-group">
        <label class="form-label">Délai (jours)</label>
        <input class="input" id="delai" type="number" min="1" max="90" value="3" />
      </div>
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="submitBtn" onclick="doCreate()">
      Publier mon service →
    </button>
  </div>
</main>
<footer id="footer"></footer>

<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script>
  if (!Auth.requireAuth()) throw '';
  renderNavbar('create');
  renderFooter();

  function previewImg(input) {
    const file = input.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    document.getElementById('imgPreview').src = url;
    document.getElementById('imgPreview').style.display = 'block';
    document.getElementById('imgPlaceholder').style.display = 'none';
    document.getElementById('imgDropzone').style.borderColor = 'var(--primary)';
  }

  async function doCreate() {
    const titre       = document.getElementById('titre').value.trim();
    const description = document.getElementById('description').value.trim();
    const prix        = document.getElementById('prix').value;
    const categorie   = document.getElementById('categorie').value;
    const delai       = document.getElementById('delai').value;
    const imgFile     = document.getElementById('imgInput').files[0];
    const alertBox    = document.getElementById('alertBox');
    alertBox.innerHTML = '';

    if (!titre || !description || !prix)
      return showAlert(alertBox, 'Titre, description et prix sont requis.');

    const btn = document.getElementById('submitBtn');
    setLoading(btn, true);
    try {
      const fd = new FormData();
      fd.append('titre', titre);
      fd.append('description', description);
      fd.append('prix', prix);
      fd.append('categorie', categorie);
      fd.append('delai', delai);
      if (imgFile) fd.append('image', imgFile);

      await api.upload('/services', fd);
      location.href = 'dashboard.html';
    } catch(err) {
      showAlert(alertBox, err.message || 'Erreur lors de la création.');
      setLoading(btn, false, 'Publier mon service →');
    }
  }
</script>
</body>
</html>
